// Kea DHCPv4 서버 설정 (rocky-node1 실제 운영본 백업 — 2026-07-19 업데이트)
//   - domain-name(code 15): example.org -> example.local 수정 완료
//   - subnet4.reservations: node2 MAC 고정 IP(192.168.56.50) 할당 완료
//
// TODO: 전역 option-data의 domain-name-servers가 "192.168.25.10, 192.0.2.2"로
//       되어 있음(오타/예제 잔재). subnet4.option-data가 우선 적용되어 실제
//       동작에는 영향 없으나(192.168.56.10이 정상 전달), 정리 필요.
{

"Dhcp4": {
    "interfaces-config": {
        "interfaces": [ "enp0s8" ]
    },

    "control-socket": {
        "socket-type": "unix",
        "socket-name": "kea4-ctrl-socket"
    },

    "lease-database": {
        "type": "memfile",
        "lfc-interval": 3600
    },

    "expired-leases-processing": {
        "reclaim-timer-wait-time": 10,
        "flush-reclaimed-timer-wait-time": 25,
        "hold-reclaimed-time": 3600,
        "max-reclaim-leases": 100,
        "max-reclaim-time": 250,
        "unwarned-reclaim-cycles": 5
    },

    "renew-timer": 900,
    "rebind-timer": 1800,
    "valid-lifetime": 3600,

    "option-data": [
        {
            "name": "domain-name-servers",
            "data": "192.168.25.10, 192.0.2.2"
        },
        {
            "code": 15,
            "data": "example.local"
        },
        {
            "name": "domain-search",
            "data": "mydomain.example.com, example.com"
        },
        {
            "name": "boot-file-name",
            "data": "EST5EDT4\\,M3.2.0/02:00\\,M11.1.0/02:00"
        },
        {
            "name": "default-ip-ttl",
            "data": "0xf0"
        }
    ],

    "client-classes": [
        {
            "name": "voip",
            "test": "substring(option[60].hex,0,6) == 'Aastra'",
            "next-server": "192.0.2.254",
            "server-hostname": "hal9000",
            "boot-file-name": "/dev/null"
        }
    ],

    "subnet4": [
        {
            "id": 1,
            "subnet": "192.168.56.0/24",
            "pools": [ { "pool": "192.168.56.100 - 192.168.56.200" } ],
            "interface": "enp0s8",
            "option-data": [
                {
                    "name": "routers",
                    "data": "192.168.56.1"
                },
                {
                    "name": "domain-name-servers",
                    "data": "192.168.56.10"
                }
            ],
            "reservations": [
                {
                    "hw-address": "08:00:27:a5:22:cf",
                    "ip-address": "192.168.56.50",
                    "hostname": "rocky-node2"
                }
            ]
        }
    ],

    "loggers": [
        {
            "name": "kea-dhcp4",
            "output-options": [
                { "output": "kea-dhcp4.log" }
            ],
            "severity": "INFO",
            "debuglevel": 0
        }
    ]
}
}