{
"Dhcp4": {
    "interfaces-config": {
        "interfaces": [ "enp0s8" ]
    },

    "control-socket": {
        "socket-type": "unix",
        "socket-name": "/run/kea/kea4-ctrl-socket"
    },

    "lease-database": {
        "type": "memfile",
        "persist": true,
        "name": "/var/lib/kea/kea-leases4.csv"
    },

    "subnet4": [
        {
            "id": 1,
            "subnet": "192.168.56.0/24",
            "interface": "enp0s8",
            "pools": [
                { "pool": "192.168.56.100 - 192.168.56.200" }
            ],
            "option-data": [
                {
                    "name": "routers",
                    "data": "192.168.56.1"
                },
                {
                    "name": "domain-name-servers",
                    "data": "192.168.56.10"
                }
                // TODO: domain-name 옵션을 example.local로 명시 추가 예정
                // {
                //     "name": "domain-name",
                //     "data": "example.local"
                // }
            ]
        }
    ],

    "loggers": [
        {
            "name": "kea-dhcp4",
            "output-options": [
                {
                    "output": "/var/log/kea/kea-dhcp4.log"
                }
            ],
            "severity": "INFO"
        }
    ]
}
}